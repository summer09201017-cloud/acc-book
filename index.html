<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="記帳" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>跨平台記帳應用</title>
    <script>
      // Apply persisted theme + accent before paint to avoid a flash on reloads.
      try {
        var t = localStorage.getItem('expense-theme');
        var isDark = t === 'dark';
        if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
        var raw = localStorage.getItem('expense-settings');
        var p = null;
        if (raw) {
          var s = JSON.parse(raw);
          var palette = {
            blue:   ['#3b82f6', '#2563eb'],
            green:  ['#10b981', '#059669'],
            purple: ['#8b5cf6', '#7c3aed'],
            orange: ['#f97316', '#ea580c'],
            pink:   ['#ec4899', '#db2777'],
            red:    ['#ef4444', '#dc2626'],
            cyan:   ['#06b6d4', '#0891b2'],
            teal:   ['#14b8a6', '#0d9488'],
            indigo: ['#6366f1', '#4f46e5'],
            yellow: ['#eab308', '#ca8a04']
          };
          if (s.accentColor === 'custom' && typeof s.accentCustomHex === 'string' && /^#[0-9a-fA-F]{6}$/.test(s.accentCustomHex)) {
            // Darken by ~12% (28 per channel) for the hover variant so the
            // preload matches what useSettings.darkenHex computes at runtime.
            var hex = s.accentCustomHex.replace('#', '');
            var dim = function(i){
              var n = Math.max(0, parseInt(hex.slice(i, i+2), 16) - 28);
              var h = n.toString(16);
              return h.length < 2 ? '0' + h : h;
            };
            p = [s.accentCustomHex, '#' + dim(0) + dim(2) + dim(4)];
          } else {
            p = palette[s.accentColor];
          }
          if (p) {
            document.documentElement.style.setProperty('--primary', p[0]);
            document.documentElement.style.setProperty('--primary-hover', p[1]);
            document.documentElement.setAttribute('data-accent', s.accentColor);
          }
        }
        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
          metaTheme.setAttribute('content', isDark ? '#0b1220' : (p ? p[0] : '#3b82f6'));
        }
      } catch (e) { /* ignore */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
